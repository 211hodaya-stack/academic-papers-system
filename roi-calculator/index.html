<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מחשבון ROI חכם</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', 'Arial', sans-serif;
      background: linear-gradient(135deg, #0a1628 0%, #0d2347 50%, #0a1628 100%);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 20px;
      color: #e8f0fe;
    }

    .container {
      width: 100%;
      max-width: 820px;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header .badge {
      display: inline-block;
      background: linear-gradient(90deg, #1a73e8, #4285f4);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 5px 16px;
      border-radius: 20px;
      margin-bottom: 16px;
    }

    .header h1 {
      font-size: 2.4rem;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .header p {
      color: #8ab4f8;
      font-size: 1rem;
    }

    /* Card */
    .card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 36px;
      margin-bottom: 24px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.3);
    }

    .card-title {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #4285f4;
      margin-bottom: 24px;
    }

    /* Form grid */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      font-size: 0.82rem;
      font-weight: 600;
      color: #8ab4f8;
      letter-spacing: 0.3px;
    }

    input[type="number"] {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      color: #ffffff;
      font-size: 1rem;
      padding: 12px 16px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      width: 100%;
      direction: ltr;
      text-align: right;
    }

    input[type="number"]:focus {
      border-color: #4285f4;
      background: rgba(66, 133, 244, 0.08);
    }

    input[type="number"]::placeholder {
      color: rgba(255, 255, 255, 0.25);
    }

    /* Slider */
    .slider-wrapper {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .slider-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .slider-value {
      background: linear-gradient(90deg, #1a73e8, #4285f4);
      color: #fff;
      font-size: 0.82rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 12px;
      min-width: 52px;
      text-align: center;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      background: linear-gradient(135deg, #4285f4, #1a73e8);
      border-radius: 50%;
      border: 2px solid #fff;
      box-shadow: 0 2px 8px rgba(66, 133, 244, 0.5);
      cursor: pointer;
    }

    /* Calculate button */
    .btn-calculate {
      width: 100%;
      padding: 16px;
      background: linear-gradient(90deg, #1a73e8, #4285f4);
      color: #ffffff;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      margin-top: 28px;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(26, 115, 232, 0.4);
    }

    .btn-calculate:hover {
      opacity: 0.92;
      transform: translateY(-1px);
      box-shadow: 0 6px 28px rgba(26, 115, 232, 0.55);
    }

    .btn-calculate:active {
      transform: translateY(0);
    }

    /* Results */
    .results-section {
      display: none;
    }

    .results-section.visible {
      display: block;
    }

    /* Metrics row */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .metric-card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 24px 20px;
      text-align: center;
      backdrop-filter: blur(6px);
      transition: border-color 0.2s;
    }

    .metric-card:hover {
      border-color: rgba(66, 133, 244, 0.4);
    }

    .metric-period {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: #4285f4;
      margin-bottom: 10px;
    }

    .metric-value {
      font-size: 1.55rem;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 4px;
    }

    .metric-growth {
      font-size: 0.78rem;
      color: #34a853;
      font-weight: 600;
    }

    /* Summary stats */
    .summary-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-item {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 18px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .stat-label {
      font-size: 0.82rem;
      color: #8ab4f8;
    }

    .stat-value {
      font-size: 1rem;
      font-weight: 700;
      color: #ffffff;
    }

    .stat-value.positive { color: #34a853; }
    .stat-value.negative { color: #ea4335; }

    /* AI Recommendation */
    .ai-card {
      background: linear-gradient(135deg, rgba(26, 115, 232, 0.12), rgba(66, 133, 244, 0.06));
      border: 1px solid rgba(66, 133, 244, 0.3);
      border-radius: 20px;
      padding: 30px;
    }

    .ai-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .ai-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #1a73e8, #4285f4);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .ai-header-text .title {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #4285f4;
    }

    .ai-header-text .subtitle {
      font-size: 0.82rem;
      color: #8ab4f8;
    }

    .ai-recommendation {
      font-size: 0.95rem;
      line-height: 1.75;
      color: #e8f0fe;
      min-height: 60px;
    }

    .ai-loading {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #8ab4f8;
      font-size: 0.88rem;
    }

    .dots span {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: #4285f4;
      border-radius: 50%;
      margin: 0 2px;
      animation: bounce 1.2s infinite;
    }

    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* Verdict badge */
    .verdict {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 700;
      margin-bottom: 14px;
    }

    .verdict.recommend {
      background: rgba(52, 168, 83, 0.15);
      border: 1px solid rgba(52, 168, 83, 0.4);
      color: #34a853;
    }

    .verdict.caution {
      background: rgba(251, 188, 5, 0.12);
      border: 1px solid rgba(251, 188, 5, 0.35);
      color: #fbbc05;
    }

    .verdict.avoid {
      background: rgba(234, 67, 53, 0.12);
      border: 1px solid rgba(234, 67, 53, 0.3);
      color: #ea4335;
    }

    /* Autosave banner */
    .autosave-banner {
      display: none;
      align-items: center;
      gap: 10px;
      background: rgba(52, 168, 83, 0.08);
      border: 1px solid rgba(52, 168, 83, 0.25);
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 0.82rem;
      color: #34a853;
      margin-bottom: 20px;
    }

    .autosave-banner.visible { display: flex; }

    .autosave-banner button {
      margin-right: auto;
      background: none;
      border: 1px solid rgba(52,168,83,0.4);
      border-radius: 6px;
      color: #34a853;
      font-size: 0.78rem;
      padding: 3px 10px;
      cursor: pointer;
    }

    /* Tooltip */
    .label-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .tooltip-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
    }

    .tooltip-icon {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: rgba(66, 133, 244, 0.25);
      border: 1px solid rgba(66, 133, 244, 0.5);
      color: #4285f4;
      font-size: 10px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: default;
      flex-shrink: 0;
      line-height: 1;
      user-select: none;
    }

    .tooltip-box {
      display: none;
      position: absolute;
      bottom: calc(100% + 8px);
      right: 50%;
      transform: translateX(50%);
      background: #0d2347;
      border: 1px solid rgba(66, 133, 244, 0.35);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.78rem;
      color: #c8d8f8;
      white-space: nowrap;
      z-index: 100;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      pointer-events: none;
      line-height: 1.5;
    }

    .tooltip-box::after {
      content: '';
      position: absolute;
      top: 100%;
      right: 50%;
      transform: translateX(50%);
      border: 6px solid transparent;
      border-top-color: rgba(66, 133, 244, 0.35);
    }

    .tooltip-wrap:hover .tooltip-box {
      display: block;
    }

    /* Chart */
    .chart-card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 24px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.3);
    }

    .chart-card .card-title {
      margin-bottom: 20px;
    }

    .chart-container {
      position: relative;
      height: 260px;
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 28px 0 8px;
      font-size: 0.78rem;
      color: rgba(138, 180, 248, 0.5);
      letter-spacing: 0.3px;
    }

    /* Responsive */
    @media (max-width: 580px) {
      .form-grid { grid-template-columns: 1fr; }
      .metrics-grid { grid-template-columns: 1fr; }
      .summary-row { grid-template-columns: 1fr; }
      .header h1 { font-size: 1.8rem; }
      .card { padding: 24px 20px; }
      .tooltip-box { white-space: normal; width: 200px; right: auto; left: 0; transform: none; }
      .tooltip-box::after { right: auto; left: 12px; transform: none; }
    }
  </style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="badge">ROI Intelligence</div>
    <h1>מחשבון ROI חכם</h1>
    <p>ניתוח פיננסי מתקדם עם המלצת AI אישית</p>
  </div>

  <!-- Input Card -->
  <div class="card">

    <div class="form-grid">

      <div class="field">
        <label>
          <div class="label-row">
            הכנסות חודשיות נוכחיות (₪)
            <div class="tooltip-wrap">
              <div class="tooltip-icon">?</div>
              <div class="tooltip-box">כמה כסף העסק מרוויח כרגע בחודש?<br/>לדוגמה: מכירות, שירותים, מנויים</div>
            </div>
          </div>
        </label>
        <input type="number" id="revenue" placeholder="0" min="0" />
      </div>

      <div class="field">
        <label>
          <div class="label-row">
            תקציב שיווק חודשי (₪)
            <div class="tooltip-wrap">
              <div class="tooltip-icon">?</div>
              <div class="tooltip-box">כמה אתה מתכנן להשקיע בפרסום?<br/>לדוגמה: מודעות, תוכן, כלים דיגיטליים</div>
            </div>
          </div>
        </label>
        <input type="number" id="budget" placeholder="0" min="0" />
      </div>

      <div class="field full">
        <div class="slider-wrapper">
          <div class="slider-header">
            <label>
              <div class="label-row">
                אחוז צמיחה משוער לחודש
                <div class="tooltip-wrap">
                  <div class="tooltip-icon">?</div>
                  <div class="tooltip-box">כמה אתה מצפה שהעסק יגדל כל חודש?<br/>בין 5% ל-30% זה סביר לרוב העסקים</div>
                </div>
              </div>
            </label>
            <span class="slider-value" id="growthLabel">5%</span>
          </div>
          <input type="range" id="growth" min="0" max="50" step="0.5" value="5"
                 oninput="document.getElementById('growthLabel').textContent = this.value + '%'" />
        </div>
      </div>

    </div>

    <button class="btn-calculate" onclick="calculate()">חשב ROI וקבל המלצה</button>
  </div>

  <!-- Results -->
  <div class="results-section" id="results">

    <!-- Autosave banner -->
    <div class="autosave-banner" id="autosaveBanner">
      <span>✦</span>
      <span>חישוב אחרון שוחזר אוטומטית</span>
      <button onclick="clearSaved()">נקה</button>
    </div>

    <!-- Forecast cards -->
    <div class="metrics-grid" id="metricsGrid"></div>

    <!-- Growth Chart -->
    <div class="chart-card">
      <div class="card-title">גרף צמיחה צפויה</div>
      <div class="chart-container">
        <canvas id="growthChart"></canvas>
      </div>
    </div>

    <!-- Summary -->
    <div class="card" style="margin-bottom: 24px;">
      <div class="card-title">סיכום פיננסי</div>
      <div class="summary-row" id="summaryRow"></div>
    </div>

    <!-- AI Recommendation -->
    <div class="ai-card">
      <div class="ai-header">
        <div class="ai-icon">✦</div>
        <div class="ai-header-text">
          <div class="title">AI Advisor</div>
          <div class="subtitle">ניתוח מותאם אישית</div>
        </div>
      </div>
      <div id="aiOutput" class="ai-recommendation">
        <div class="ai-loading">
          מנתח נתונים
          <div class="dots"><span></span><span></span><span></span></div>
        </div>
      </div>
    </div>

  </div>

  <div class="footer">נבנה עם Claude Code 💙</div>
</div>

<script>
  // Set your OpenAI API key once via browser console:
  // localStorage.setItem('roi_api_key', 'sk-...')
  const STORAGE_KEY     = 'roi_api_key';
  const AUTOSAVE_KEY    = 'roi_last_calc';

  function getApiKey() {
    return localStorage.getItem(STORAGE_KEY) || '';
  }

  function saveCalc(data) {
    localStorage.setItem(AUTOSAVE_KEY, JSON.stringify(data));
  }

  function loadCalc() {
    try { return JSON.parse(localStorage.getItem(AUTOSAVE_KEY)); } catch { return null; }
  }

  function clearSaved() {
    localStorage.removeItem(AUTOSAVE_KEY);
    document.getElementById('autosaveBanner').classList.remove('visible');
    document.getElementById('results').classList.remove('visible');
  }

  function formatCurrency(n) {
    return '₪' + Math.round(n).toLocaleString('he-IL');
  }

  function calcForecast(revenue, growthRate, months) {
    return revenue * Math.pow(1 + growthRate / 100, months);
  }

  function calcAnnualForecast(revenue, growth) {
    // Sum of monthly revenues over 12 months with compound growth
    let total = 0;
    for (let m = 1; m <= 12; m++) total += calcForecast(revenue, growth, m);
    return total;
  }

  function calcROI(revenue, budget, growth) {
    if (budget === 0) return Infinity;
    const annualForecast = calcAnnualForecast(revenue, growth);
    const annualCurrent  = revenue * 12;
    const annualBudget   = budget  * 12;
    return ((annualForecast - annualCurrent - annualBudget) / annualBudget) * 100;
  }

  function calcNetProfit(revenue, budget, growth) {
    return calcAnnualForecast(revenue, growth) - revenue * 12 - budget * 12;
  }

  function calculate() {
    const revenue = parseFloat(document.getElementById('revenue').value) || 0;
    const budget  = parseFloat(document.getElementById('budget').value)  || 0;
    const growth  = parseFloat(document.getElementById('growth').value)  || 0;

    if (revenue <= 0 || budget <= 0) {
      alert('נא להזין הכנסות ותקציב חודשיים.');
      return;
    }

    const f3  = calcForecast(revenue, growth, 3);
    const f6  = calcForecast(revenue, growth, 6);
    const f12 = calcForecast(revenue, growth, 12);

    // Render forecast cards
    const periods = [
      { label: 'עוד 3 חודשים', value: f3,  months: 3  },
      { label: 'עוד 6 חודשים', value: f6,  months: 6  },
      { label: 'עוד שנה',      value: f12, months: 12 },
    ];

    document.getElementById('metricsGrid').innerHTML = periods.map(p => {
      const pct = ((p.value - revenue) / revenue * 100).toFixed(1);
      return `
        <div class="metric-card">
          <div class="metric-period">${p.label}</div>
          <div class="metric-value">${formatCurrency(p.value)}</div>
          <div class="metric-growth">+${pct}% מהיום</div>
        </div>`;
    }).join('');

    // Chart
    renderChart(revenue, growth);

    // Summary
    const roi       = calcROI(revenue, budget, growth);
    const netProfit = calcNetProfit(revenue, budget, growth);
    const roiClass  = roi > 0 ? 'positive' : roi === 0 ? '' : 'negative';

    document.getElementById('summaryRow').innerHTML = `
      <div class="stat-item">
        <span class="stat-label">ROI שנתי</span>
        <span class="stat-value ${roiClass}">${roi === Infinity ? '∞' : roi.toFixed(1) + '%'}</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">רווח / הפסד שנתי כולל</span>
        <span class="stat-value ${netProfit >= 0 ? 'positive' : 'negative'}">${formatCurrency(netProfit)}</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">הכנסות שנתיות חזויות</span>
        <span class="stat-value positive">${formatCurrency(calcAnnualForecast(revenue, growth))}</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">הכנסות בעוד שנה (חודש 12)</span>
        <span class="stat-value positive">${formatCurrency(f12)}</span>
      </div>`;

    // Show results section
    document.getElementById('results').classList.add('visible');
    document.getElementById('aiOutput').innerHTML = `
      <div class="ai-loading">מנתח נתונים<div class="dots"><span></span><span></span><span></span></div></div>`;

    // Scroll to results
    document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });

    // Autosave inputs & results
    saveCalc({ revenue, budget, growth });

    // Call AI
    fetchAIRecommendation({ revenue, budget, growth, f3, f6, f12, roi, netProfit });
  }

  let chartInstance = null;

  function renderChart(revenue, growth) {
    const labels = ['היום'];
    const values = [revenue];

    for (let m = 1; m <= 12; m++) {
      labels.push(`חודש ${m}`);
      values.push(calcForecast(revenue, growth, m));
    }

    const ctx = document.getElementById('growthChart').getContext('2d');

    if (chartInstance) chartInstance.destroy();

    chartInstance = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label: 'הכנסות חזויות (₪)',
          data: values,
          borderColor: '#4285f4',
          backgroundColor: 'rgba(66, 133, 244, 0.08)',
          borderWidth: 2.5,
          pointBackgroundColor: '#4285f4',
          pointBorderColor: '#fff',
          pointBorderWidth: 2,
          pointRadius: 4,
          pointHoverRadius: 6,
          fill: true,
          tension: 0.4,
        }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            rtl: true,
            backgroundColor: '#0d2347',
            borderColor: 'rgba(66,133,244,0.4)',
            borderWidth: 1,
            titleColor: '#8ab4f8',
            bodyColor: '#fff',
            padding: 12,
            callbacks: {
              label: ctx => ' ' + formatCurrency(ctx.parsed.y),
            },
          },
        },
        scales: {
          x: {
            grid: { color: 'rgba(255,255,255,0.05)' },
            ticks: { color: '#8ab4f8', font: { size: 11 } },
          },
          y: {
            grid: { color: 'rgba(255,255,255,0.05)' },
            ticks: {
              color: '#8ab4f8',
              font: { size: 11 },
              callback: v => '₪' + Math.round(v).toLocaleString('he-IL'),
            },
          },
        },
      },
    });
  }

  async function fetchAIRecommendation(data) {
    const apiKey = getApiKey();
    const outputEl = document.getElementById('aiOutput');

    if (!apiKey) {
      outputEl.innerHTML = `
        <div class="verdict caution">⚠ ללא המלצת AI</div>
        <p>לא הוגדר מפתח API. הזן את המפתח בתיבה למעלה וחשב שוב.</p>`;
      return;
    }

    const prompt = `אתה יועץ פיננסי מומחה. נתח את הנתונים הבאים ותן המלצה ברורה בעברית (3-4 משפטים קצרים):

- הכנסות חודשיות: ₪${Math.round(data.revenue).toLocaleString()}
- תקציב/עלות חודשית: ₪${Math.round(data.budget).toLocaleString()}
- רווח/הפסד שנתי כולל: ₪${Math.round(data.netProfit).toLocaleString()}
- ROI שנתי: ${data.roi === Infinity ? 'אין עלות' : data.roi.toFixed(1) + '%'}
- צמיחה חודשית צפויה: ${data.growth}%
- תחזית 3 חודשים: ₪${Math.round(data.f3).toLocaleString()}
- תחזית 6 חודשים: ₪${Math.round(data.f6).toLocaleString()}
- תחזית 12 חודשים: ₪${Math.round(data.f12).toLocaleString()}

פתח בהמלצה חד-משמעית: "מומלץ להשקיע" / "מומלץ להמתין" / "לא מומלץ להשקיע".
לאחר מכן נמק בקצרה.`;

    try {
      const response = await fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`,
        },
        body: JSON.stringify({
          model: 'gpt-4o-mini',
          max_tokens: 300,
          messages: [{ role: 'user', content: prompt }],
        }),
      });

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        throw new Error(err?.error?.message || `שגיאת API: ${response.status}`);
      }

      const json = await response.json();
      const text = json.choices?.[0]?.message?.content || '';

      // Determine verdict class from AI response
      let verdictClass = 'caution', verdictLabel = '⚖ מומלץ לשקול';
      if (/מומלץ להשקיע/i.test(text)) {
        verdictClass = 'recommend'; verdictLabel = '✓ מומלץ להשקיע';
      } else if (/לא מומלץ/i.test(text)) {
        verdictClass = 'avoid'; verdictLabel = '✕ לא מומלץ להשקיע';
      } else if (/להמתין/i.test(text)) {
        verdictClass = 'caution'; verdictLabel = '⏳ מומלץ להמתין';
      }

      outputEl.innerHTML = `
        <div class="verdict ${verdictClass}">${verdictLabel}</div>
        <p>${text.replace(/\n/g, '<br/>')}</p>`;

    } catch (e) {
      outputEl.innerHTML = `
        <div class="verdict avoid">✕ שגיאה</div>
        <p>${e.message}</p>`;
    }
  }

  // On load — restore last calculation if exists
  window.addEventListener('DOMContentLoaded', () => {
    const saved = loadCalc();
    if (!saved) return;

    document.getElementById('revenue').value = saved.revenue;
    document.getElementById('budget').value  = saved.budget;
    document.getElementById('growth').value  = saved.growth;
    document.getElementById('growthLabel').textContent = saved.growth + '%';

    // Re-run silently to restore results
    const { revenue, budget, growth } = saved;
    const f3        = calcForecast(revenue, growth, 3);
    const f6        = calcForecast(revenue, growth, 6);
    const f12       = calcForecast(revenue, growth, 12);
    const roi       = calcROI(revenue, budget, growth);
    const netProfit = calcNetProfit(revenue, budget, growth);

    const periods = [
      { label: 'עוד 3 חודשים', value: f3  },
      { label: 'עוד 6 חודשים', value: f6  },
      { label: 'עוד שנה',      value: f12 },
    ];

    document.getElementById('metricsGrid').innerHTML = periods.map(p => {
      const pct = ((p.value - revenue) / revenue * 100).toFixed(1);
      return `<div class="metric-card">
        <div class="metric-period">${p.label}</div>
        <div class="metric-value">${formatCurrency(p.value)}</div>
        <div class="metric-growth">+${pct}% מהיום</div>
      </div>`;
    }).join('');

    const roiClass = roi > 0 ? 'positive' : roi === 0 ? '' : 'negative';
    document.getElementById('summaryRow').innerHTML = `
      <div class="stat-item"><span class="stat-label">ROI שנתי</span><span class="stat-value ${roiClass}">${roi === Infinity ? '∞' : roi.toFixed(1) + '%'}</span></div>
      <div class="stat-item"><span class="stat-label">רווח / הפסד שנתי כולל</span><span class="stat-value ${netProfit >= 0 ? 'positive' : 'negative'}">${formatCurrency(netProfit)}</span></div>
      <div class="stat-item"><span class="stat-label">הכנסות שנתיות חזויות</span><span class="stat-value positive">${formatCurrency(calcAnnualForecast(revenue, growth))}</span></div>
      <div class="stat-item"><span class="stat-label">הכנסות בעוד שנה (חודש 12)</span><span class="stat-value positive">${formatCurrency(f12)}</span></div>`;

    renderChart(revenue, growth);

    document.getElementById('aiOutput').innerHTML =
      '<p style="color:#8ab4f8;font-size:0.88rem;">לחץ על "חשב ROI" לקבלת המלצת AI מעודכנת.</p>';

    document.getElementById('results').classList.add('visible');
    document.getElementById('autosaveBanner').classList.add('visible');
  });
</script>
