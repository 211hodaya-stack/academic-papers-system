name: Fetch Academic Papers

on:
  schedule:
    - cron: '0 6 * * 0'   # Every Sunday at 06:00 UTC
  workflow_dispatch:        # Allow manual trigger for testing

jobs:
  fetch-papers:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Required for git push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: academic-papers/requirements.txt

      - name: Install dependencies
        run: pip install -r academic-papers/requirements.txt

      - name: Run fetch script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python academic-papers/scripts/fetch_papers.py

      - name: Check if new papers were found
        id: check_changes
        run: |
          if [ -f academic-papers/.no_new_papers ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            rm -f academic-papers/.no_new_papers
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push updated files
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add academic-papers/papers.json academic-papers/index.html
          git commit -m "chore: add new academic papers [$(date -u '+%Y-%m-%d')]"
          git push
