<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מאמרים אקדמיים | עבודה סוציאלית ולקויות</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Heebo', sans-serif;
      background: #FFF5F0;
      color: #5C4A47;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    header {
      background: linear-gradient(135deg, #C97B6E, #E8A598);
      color: white;
      width: 100%;
      padding: 3rem 1.5rem 2.5rem;
      margin-bottom: 3rem;
      position: fixed;
      top: 0;
    }
    header h1 { font-size: 2rem; font-weight: 800; margin-bottom: 0.5rem; }
    header p  { font-size: 1rem; opacity: 0.9; }
    .content {
      margin-top: 180px;
      background: white;
      border-radius: 16px;
      padding: 3rem 2.5rem;
      box-shadow: 0 4px 24px rgba(92,74,71,0.10);
      max-width: 500px;
    }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
    h2 { font-size: 1.4rem; font-weight: 800; margin-bottom: 0.8rem; }
    p  { font-size: 0.95rem; line-height: 1.8; color: #8B7570; }
  </style>
</head>
<body>
  <header>
    <h1>מאמרים אקדמיים</h1>
    <p>עבודה סוציאלית, לקויות קוגניטיביות, AAC ותמיכה חברתית</p>
  </header>
  <div class="content">
    <div class="icon">⏳</div>
    <h2>האתר מוכן — ממתין לריצה הראשונה</h2>
    <p>
      המאמרים יופיעו כאן אחרי שה-GitHub Actions workflow ירוץ בפעם הראשונה.<br /><br />
      ניתן להפעיל אותו ידנית דרך:<br />
      <strong>Actions → Fetch Academic Papers → Run workflow</strong>
    </p>
  </div>
</body>
</html>
